name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update repository
        run: |
          cd /home/server/web/app/my-project
          git pull origin main

      - name: Restart containers
        run: |
          cd /home/server/web
          docker compose restart php nginx