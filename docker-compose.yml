services:

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: cicd-nginx
    restart: unless-stopped

    depends_on:
      - app

    networks:
      - web
      - backend

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.cicd.rule=Host(`systems.kuyen.online`)"
      - "traefik.http.routers.cicd.entrypoints=websecure"
      - "traefik.http.routers.cicd.tls.certresolver=letsencrypt"
      - "traefik.http.services.cicd.loadbalancer.server.port=80"


  app:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: cicd-php
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - mysql

    networks:
      - backend


  mysql:
    image: mysql:8
    container_name: cicd-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - /srv/databases/mysql:/var/lib/mysql

    networks:
      - backend


networks:
  web:
    external: true
  backend: