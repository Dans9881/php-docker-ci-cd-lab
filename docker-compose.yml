services:

  nginx:
    image: nginx:latest
    container_name: cicd-nginx

    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - webnet

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=webnet"
      - "traefik.http.routers.cicd.rule=Host(`lab.kuyen.online`)"
      - "traefik.http.routers.cicd.entrypoints=web"
      - "traefik.http.services.cicd.loadbalancer.server.port=80"

  app:
    build: .
    container_name: cicd-php

    volumes:
      - ./src:/var/www/html

    networks:
      - webnet

networks:
  webnet:
    external: true
