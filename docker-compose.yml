services:

  nginx:
    image: nginx:latest
    container_name: cicd-nginx
    restart: unless-stopped

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/html

    depends_on:
      - app

    networks:
      - webnet

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=webnet"
      - "traefik.http.routers.cicd.rule=Host(`lab.kuyen.online`)"
      - "traefik.http.routers.cicd.entrypoints=web"
      - "traefik.http.services.cicd.loadbalancer.server.port=80"


  app:
    image: dans9881/php-docker-ci-cd-lab:latest
    container_name: cicd-php
    restart: unless-stopped

    volumes:
      - ./src:/var/www/html

    env_file:
      - .env

    depends_on:
      - mysql

    networks:
      - webnet


  mysql:
    image: mysql:8
    container_name: cicd-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - /srv/volumes/mysql:/var/lib/mysql

    networks:
      - webnet


networks:
  webnet:
    external: true