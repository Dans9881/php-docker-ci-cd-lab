name: Build Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t dans9881/php-docker-ci-cd-lab:latest .

      - name: Push image
        run: docker push dans9881/php-docker-ci-cd-lab:latest

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Deploy container
        run: |
          cd /srv/apps/php-docker-ci-cd-lab

          docker pull dans9881/php-docker-ci-cd-lab:latest

          docker compose down
          docker compose up -d