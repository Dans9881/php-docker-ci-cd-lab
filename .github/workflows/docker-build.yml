name: Build Push and Deploy

on:
  push:
    branches:
      - main

env:
  PHP_IMAGE_NAME: dans9881/php-docker-ci-cd-lab-php
  NGINX_IMAGE_NAME: dans9881/php-docker-ci-cd-lab-nginx
  APP_PATH: /srv/apps/php-docker-ci-cd-lab

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & Push PHP Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.php
          push: true
          tags: |
            ${{ env.PHP_IMAGE_NAME }}:latest
            ${{ env.PHP_IMAGE_NAME }}:${{ env.TAG }}

      - name: Build & Push Nginx Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE_NAME }}:latest
            ${{ env.NGINX_IMAGE_NAME }}:${{ env.TAG }}

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build

    steps:
      - name: Deploy Application
        run: |
          set -e
          cd $APP_PATH

          export IMAGE_TAG=${TAG}
          echo "Deploying image tag: $IMAGE_TAG"

          docker compose pull
          docker compose up -d --remove-orphans

          docker image prune -af